<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bloomberg Terminal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--o:#ff6600;--b:#000;--d:#0f0f0f;--g:#1e1e1e;--g2:#2a2a2a;--lg:#555;--gr:#00e676;--r:#ff3333;--y:#ffcc00;--w:#fff;--bl:#0099ff;--pu:#cc44ff}
body{font-family:'Courier New',monospace;background:var(--b);color:var(--o);min-height:100vh}
.hdr{background:linear-gradient(#ff6600,#cc4400);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--y)}
.logo{font-size:16px;font-weight:bold;color:#000;letter-spacing:2px}
.hdr-r{font-size:10px;color:#000;text-align:right;line-height:1.6}
.nav{background:var(--d);padding:4px 6px;display:flex;gap:3px;flex-wrap:wrap;border-bottom:1px solid var(--g2);overflow-x:auto}
.nb{background:var(--g2);color:var(--o);border:1px solid #333;padding:6px 9px;font-size:9px;font-family:inherit;cursor:pointer;text-transform:uppercase;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.nb.on{background:var(--o);color:#000;font-weight:bold}
.tkr{background:#050505;border-bottom:1px solid var(--g2);height:26px;overflow:hidden;display:flex;align-items:center}
.ti{display:flex;white-space:nowrap;animation:sc 45s linear infinite}
@keyframes sc{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tick{display:inline-flex;align-items:center;gap:5px;padding:0 12px;font-size:10px;border-right:1px solid #1a1a1a;height:26px}
.ts{color:var(--y);font-weight:bold}.tp{color:var(--w)}
.main{padding:7px 7px 50px}
.pnl{border:1px solid var(--g2);margin-bottom:9px}
.ph{background:var(--g);padding:6px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--g2)}
.pt{font-size:10px;font-weight:bold;color:var(--o);letter-spacing:1px}
.bdg{background:var(--o);color:#000;font-size:8px;padding:2px 6px;font-weight:bold}
.live{animation:bl 2s ease-in-out infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.4}}
.pb{padding:8px}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.mc{background:#080808;border:1px solid var(--g2);padding:7px 5px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.mc:active{border-color:var(--o)}
.ml{font-size:7px;color:var(--lg);text-transform:uppercase;margin-bottom:2px}
.mv{font-size:13px;font-weight:bold;color:var(--w);margin-bottom:2px}
.mc-c{font-size:10px;font-weight:bold}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{color:var(--lg);padding:4px 6px;border-bottom:1px solid var(--g2);font-size:9px;text-transform:uppercase;text-align:left}
.tbl th:not(:first-child){text-align:right}
.tbl td{padding:6px 6px;border-bottom:1px solid #111}
.tbl tr:active td{background:#111}
.sym{color:var(--y);font-weight:bold;font-size:12px}
.nm{color:var(--lg);font-size:9px;margin-top:1px}
.px{text-align:right;color:var(--w);font-weight:bold}
.ch{text-align:right;font-weight:bold}
.up{color:var(--gr)}.dn{color:var(--r)}
.ld{display:flex;align-items:center;gap:8px;padding:20px;color:var(--lg);justify-content:center;font-size:11px}
.sp{width:13px;height:13px;border:2px solid #2a2a2a;border-top-color:var(--o);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.sb{position:fixed;bottom:0;left:0;right:0;background:var(--d);padding:5px 10px;display:flex;justify-content:space-between;font-size:9px;color:var(--lg);border-top:1px solid var(--g2);z-index:50}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gr);display:inline-block;margin-right:4px;vertical-align:middle}
.dot.off{background:var(--r)}
.wrow{display:flex;gap:4px;margin-bottom:9px}
.wrow input{flex:1;background:var(--g);border:1px solid var(--g2);color:var(--y);padding:7px 8px;font-family:inherit;font-size:11px;text-transform:uppercase;outline:none}
.wrow button{background:var(--o);color:#000;border:none;padding:7px 14px;font-family:inherit;font-size:14px;font-weight:bold;cursor:pointer}
.wdel{color:var(--r);cursor:pointer;font-size:14px;padding:0 5px}
.dtl{display:none;position:fixed;inset:0;background:var(--b);z-index:500;overflow-y:auto}
.dtl.on{display:block}
.dh{background:var(--g);padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--o);position:sticky;top:0;z-index:10}
.dc{background:var(--o);color:#000;border:none;padding:7px 14px;font-family:inherit;font-weight:bold;cursor:pointer;font-size:11px}
.db{padding:12px}
.dp{font-size:30px;font-weight:bold;color:var(--w)}
.dch{font-size:15px;margin-top:4px;font-weight:bold}
.rtabs{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.rt{background:var(--g2);color:var(--lg);border:none;padding:5px 10px;font-family:inherit;font-size:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.rt.on{background:var(--o);color:#000;font-weight:bold}
.itabs{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
.it{background:#05050f;color:var(--bl);border:1px solid #003388;padding:4px 9px;font-family:inherit;font-size:9px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.it.on{background:var(--bl);color:#000;font-weight:bold}
.cw{height:190px;background:#000;border:1px solid var(--g2);margin-top:6px;position:relative;overflow:hidden}
.cw canvas{position:absolute;top:0;left:0;width:100% !important;height:100% !important}
.cmsg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--lg);font-size:10px;z-index:2}
.cov{position:absolute;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:3}
.icw{height:90px;background:#000;border:1px solid var(--g2);margin-top:4px;position:relative;overflow:hidden}
.icw canvas{position:absolute;top:0;left:0;width:100% !important;height:100% !important}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px}
.si{background:var(--g);border:1px solid var(--g2);padding:9px}
.sl{font-size:9px;color:var(--lg);text-transform:uppercase}
.sv{font-size:13px;color:var(--w);font-weight:bold;margin-top:3px}
.indgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px}
.indbox{background:#05050f;border:1px solid #003388;padding:8px}
.indlbl{font-size:8px;color:var(--bl);text-transform:uppercase;letter-spacing:1px}
.indval{font-size:14px;font-weight:bold;color:var(--w);margin-top:2px}
.indsig{font-size:9px;font-weight:bold;margin-top:2px}
.ai{background:#05050f;border:1px solid var(--bl);padding:12px;margin-top:12px}
.ai-t{font-size:9px;color:var(--bl);letter-spacing:1px;margin-bottom:8px}
.ai-s{font-size:28px;font-weight:bold;text-align:center;padding:6px 0;letter-spacing:3px}
.ai-s.buy{color:var(--gr)}.ai-s.sell{color:var(--r)}.ai-s.hold{color:var(--y)}
.ai-bars{display:flex;gap:5px;margin:8px 0}
.ai-bw{flex:1;text-align:center}
.ai-bl{font-size:8px;color:var(--lg);margin-bottom:3px}
.ai-bg{background:var(--g2);height:5px;border-radius:3px;overflow:hidden}
.ai-bf{height:100%;border-radius:3px;transition:width .6s}
.ai-bf.buy{background:var(--gr)}.ai-bf.sell{background:var(--r)}.ai-bf.hold{background:var(--y)}
.ai-bp{font-size:9px;color:var(--w);margin-top:2px}
.ai-rs{margin-top:8px;border-top:1px solid var(--g2);padding-top:8px}
.ai-r{font-size:10px;color:var(--lg);padding:2px 0;display:flex;gap:5px;line-height:1.5}
.ai-d{font-size:8px;color:#333;margin-top:6px}

/* PORTFOLIO */
.port-add{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.port-add input{background:var(–g);border:1px solid var(–g2);color:var(–y);padding:7px 8px;font-family:inherit;font-size:11px;outline:none;text-transform:uppercase;width:100%}
.port-add input::placeholder{text-transform:none;color:#333}
.port-add button{grid-column:1/-1;background:var(–o);color:#000;border:none;padding:8px;font-family:inherit;font-size:12px;font-weight:bold;cursor:pointer}
.port-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:10px}
.ps{background:var(–g);border:1px solid var(–g2);padding:8px;text-align:center}
.ps-l{font-size:8px;color:var(–lg);text-transform:uppercase}
.ps-v{font-size:13px;font-weight:bold;color:var(–w);margin-top:2px}

/* ALARM */
.alarm-row{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.alarm-row input{flex:1;min-width:80px;background:var(–g);border:1px solid var(–g2);color:var(–y);padding:6px 8px;font-family:inherit;font-size:11px;outline:none;text-transform:uppercase}
.alarm-row input::placeholder{text-transform:none;color:#333}
.alarm-row button{background:var(–o);color:#000;border:none;padding:6px 12px;font-family:inherit;font-size:11px;font-weight:bold;cursor:pointer}
.alarm-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #111;font-size:11px}
.alarm-del{color:var(–r);cursor:pointer;font-size:14px}
.alarm-active{color:var(–gr)}
.alarm-hit{animation:pulse 0.5s ease-in-out 3}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}

/* ORDERBOOK */
.ob-wrap{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.ob-side{font-size:10px}
.ob-hdr{font-size:8px;color:var(–lg);padding:3px 4px;text-transform:uppercase;display:flex;justify-content:space-between}
.ob-row{display:flex;justify-content:space-between;padding:3px 4px;position:relative;font-size:10px}
.ob-bar{position:absolute;top:0;bottom:0;opacity:0.15;border-radius:1px}
.ob-bid .ob-bar{background:var(–gr);right:0}
.ob-ask .ob-bar{background:var(–r);left:0}
.ob-spread{text-align:center;padding:6px;font-size:10px;color:var(–y);border-top:1px solid var(–g2);border-bottom:1px solid var(–g2);margin:3px 0}

/* HEATMAP */
.heatmap{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.hm-cell{padding:10px 5px;text-align:center;border-radius:2px;cursor:pointer}
.hm-sym{font-size:9px;font-weight:bold;color:#000}
.hm-pct{font-size:11px;font-weight:bold;color:#000;margin-top:2px}

/* ECONOMIC CALENDAR */
.eco-item{padding:8px 0;border-bottom:1px solid #111;display:flex;gap:8px;align-items:flex-start}
.eco-time{font-size:9px;color:var(–o);white-space:nowrap;margin-top:1px}
.eco-imp{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.eco-imp.high{background:var(–r)}
.eco-imp.med{background:var(–y)}
.eco-imp.low{background:var(–lg)}
.eco-name{font-size:11px;color:var(–w);line-height:1.4}
.eco-val{font-size:9px;color:var(–lg);margin-top:2px}

/* FEAR GREED */
.fg-wrap{text-align:center;padding:10px 0}
.fg-val{font-size:48px;font-weight:bold;margin:8px 0}
.fg-label{font-size:14px;font-weight:bold;letter-spacing:2px}
.fg-bar-wrap{margin:12px 0;position:relative}
.fg-bar-bg{height:12px;border-radius:6px;background:linear-gradient(to right,#ff3333,#ff9900,#ffcc00,#99cc00,#00e676);margin:0 10px}
.fg-needle{position:absolute;top:-4px;width:4px;height:20px;background:var(–w);border-radius:2px;transform:translateX(-50%)}
.fg-labels{display:flex;justify-content:space-between;font-size:8px;color:var(–lg);margin:4px 10px 0}
.fg-hist{display:flex;gap:4px;margin-top:10px;justify-content:center}
.fg-h{text-align:center}
.fg-h-val{font-size:11px;font-weight:bold}
.fg-h-lbl{font-size:8px;color:var(–lg);margin-top:1px}

/* KORRELATION */
.corr-grid{overflow-x:auto}
.corr-table{border-collapse:collapse;font-size:9px;min-width:100%}
.corr-table td,.corr-table th{padding:5px 6px;text-align:center;border:1px solid #111}
.corr-table th{color:var(–o);background:var(–g);font-size:8px}

/* EARNINGS */
.earn-item{padding:8px 0;border-bottom:1px solid #111;display:flex;justify-content:space-between;align-items:center}
.earn-info{flex:1}
.earn-sym{font-size:12px;font-weight:bold;color:var(–y)}
.earn-name{font-size:9px;color:var(–lg);margin-top:1px}
.earn-date{font-size:10px;color:var(–o);text-align:right}
.earn-eps{font-size:9px;color:var(–lg);margin-top:2px;text-align:right}
</style>

</head>
<body>

<header class="hdr">
  <div class="logo">▶ BLOOMBERG TERMINAL</div>
  <div class="hdr-r"><div id="hTime">--:--:--</div><div id="hDate">---</div></div>
</header>

<nav class="nav">
  <button class="nb on" data-v="markets">Märkte</button>
  <button class="nb" data-v="portfolio">Portfolio</button>
  <button class="nb" data-v="watchlist">Watchlist</button>
  <button class="nb" data-v="alarms">Alarme</button>
  <button class="nb" data-v="heatmap">Heatmap</button>
  <button class="nb" data-v="crypto">Crypto</button>
  <button class="nb" data-v="forex">Forex</button>
  <button class="nb" data-v="calendar">Kalender</button>
  <button class="nb" data-v="earnings">Earnings</button>
  <button class="nb" data-v="feargreed">Fear&Greed</button>
</nav>

<div class="tkr"><div class="ti" id="tickerEl"><span class="ld"><span class="sp"></span>&nbsp;Lade...</span></div></div>
<main class="main" id="mainEl"><div class="ld"><span class="sp"></span>&nbsp;Lade Daten...</div></main>
<div class="sb"><span><span class="dot" id="sDot"></span><span id="sTxt">Verbinde...</span></span><span id="sUpd">--:--</span></div>

<div class="dtl" id="dtlEl">
  <div class="dh">
    <div><div class="pt" id="dSym" style="font-size:14px">---</div><div style="color:var(--lg);font-size:10px;margin-top:2px" id="dName">---</div></div>
    <button class="dc" onclick="closeDetail()">✕ SCHLIESSEN</button>
  </div>
  <div class="db" id="dBody"></div>
</div>

<script>
'use strict';

const FH = 'd701ou1r01qjh1odthigd701ou1r01qjh1odthj0';

const NAMES = {
  'AAPL':'Apple','MSFT':'Microsoft','GOOGL':'Alphabet','AMZN':'Amazon',
  'TSLA':'Tesla','NVDA':'NVIDIA','META':'Meta','JPM':'JPMorgan',
  'NFLX':'Netflix','AMD':'AMD','DIS':'Disney','UBER':'Uber',
  'BABA':'Alibaba','ORCL':'Oracle','INTC':'Intel','CRM':'Salesforce',
  'bitcoin':'Bitcoin','ethereum':'Ethereum','binancecoin':'BNB',
  'solana':'Solana','ripple':'XRP','cardano':'ADA','dogecoin':'DOGE','polkadot':'DOT',
  'EURUSD':'EUR/USD','GBPUSD':'GBP/USD','USDJPY':'USD/JPY',
  'USDCHF':'USD/CHF','AUDUSD':'AUD/USD','USDCAD':'USD/CAD',
  'EURGBP':'EUR/GBP','EURJPY':'EUR/JPY'
};
const CATS = {
  stocks:['AAPL','MSFT','GOOGL','AMZN','TSLA','NVDA','META','JPM','NFLX','AMD'],
  crypto:['bitcoin','ethereum','binancecoin','solana','ripple','cardano','dogecoin','polkadot'],
  forex: ['EURUSD','GBPUSD','USDJPY','USDCHF','AUDUSD','USDCAD','EURGBP','EURJPY']
};
const GECKO = ['bitcoin','ethereum','binancecoin','solana','ripple','cardano','dogecoin','polkadot'];

// Cache
const C={};
function cg(k){const e=C[k];return(e&&Date.now()-e.t<25000)?e.d:null;}
function cs(k,d){C[k]={d,t:Date.now()};}

// State
let Q={}, VIEW='markets', TMR=null;
let CHART_DATA=null, CURRENT_SYM='', CURRENT_IND='price';

// Portfolio & Alarms aus localStorage
let PORTFOLIO=[], ALARMS=[], WL=['AAPL','bitcoin','EURUSD'];
try{
  const p=localStorage.getItem('bb_port');if(p)PORTFOLIO=JSON.parse(p);
  const a=localStorage.getItem('bb_alarms');if(a)ALARMS=JSON.parse(a);
  const w=localStorage.getItem('bb_wl');if(w)WL=JSON.parse(w);
}catch(e){}

function savePort(){try{localStorage.setItem('bb_port',JSON.stringify(PORTFOLIO));}catch(e){}}
function saveAlarms(){try{localStorage.setItem('bb_alarms',JSON.stringify(ALARMS));}catch(e){}}
function saveWL(){try{localStorage.setItem('bb_wl',JSON.stringify(WL));}catch(e){}}

// ── API ───────────────────────────────────────────────────────────────
async function loadStock(sym){
  const hit=cg('s'+sym);if(hit)return hit;
  try{
    const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${FH}`,{signal:AbortSignal.timeout(7000)});
    if(!r.ok)throw new Error();
    const d=await r.json();
    if(!d.c||d.c===0)return null;
    const out={symbol:sym,name:NAMES[sym]||sym,price:d.c,change:d.c-d.pc,pct:((d.c-d.pc)/d.pc)*100,open:d.o,high:d.h,low:d.l,prev:d.pc,currency:'USD'};
    cs('s'+sym,out);return out;
  }catch(e){return null;}
}

async function loadStocks(syms){
  const res=await Promise.allSettled(syms.map(s=>loadStock(s)));
  let ok=0;
  res.forEach(r=>{if(r.status==='fulfilled'&&r.value){Q[r.value.symbol]=r.value;ok++;}});
  return ok>0;
}

async function loadChart(sym,days=1){
  const hit=cg('c'+sym+days);if(hit)return hit;
  try{
    const lookback=days===1?7:days+5;
    const res=days===1?'30':days<=7?'60':'D';
    const to=Math.floor(Date.now()/1000);
    const from=to-(lookback*86400);
    const r=await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${sym}&resolution=${res}&from=${from}&to=${to}&token=${FH}`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)throw new Error();
    const d=await r.json();
    if(d.s==='ok'&&d.c&&d.c.length>=2){
      const out={prices:d.c,high:d.h,low:d.l,open:d.o,timestamps:d.t};
      cs('c'+sym+days,out);return out;
    }
    // Fallback: Tagesdaten
    const r2=await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${sym}&resolution=D&from=${to-(90*86400)}&to=${to}&token=${FH}`,{signal:AbortSignal.timeout(8000)});
    if(!r2.ok)return null;
    const d2=await r2.json();
    if(d2.s!=='ok'||!d2.c||d2.c.length<2)return null;
    const out={prices:d2.c,high:d2.h,low:d2.l,open:d2.o,timestamps:d2.t};
    cs('c'+sym+days,out);return out;
  }catch(e){return null;}
}

async function loadCrypto(){
  const hit=cg('crypto');if(hit){Object.assign(Q,hit);return true;}
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids='+GECKO.join(',')+'&order=market_cap_desc&sparkline=false',{signal:AbortSignal.timeout(9000)});
    if(!r.ok)throw new Error();
    const d=await r.json();
    const out={};
    d.forEach(c=>{out[c.id]={symbol:c.id,name:c.name,price:c.current_price,pct:c.price_change_percentage_24h,change:c.price_change_24h,high:c.high_24h,low:c.low_24h,mcap:c.market_cap,volume:c.total_volume,currency:'USD'};});
    cs('crypto',out);Object.assign(Q,out);return true;
  }catch(e){return false;}
}

async function loadForex(){
  const hit=cg('forex');if(hit){Object.assign(Q,hit);return true;}
  try{
    const[r1,r2]=await Promise.all([
      fetch('https://api.frankfurter.app/latest?from=USD',{signal:AbortSignal.timeout(7000)}).then(r=>r.json()),
      fetch('https://api.frankfurter.app/latest?from=EUR',{signal:AbortSignal.timeout(7000)}).then(r=>r.json())
    ]);
    const out={};
    const map={USDJPY:[r1.rates?.JPY,'JPY'],USDCHF:[r1.rates?.CHF,'CHF'],USDCAD:[r1.rates?.CAD,'CAD'],EURUSD:[r2.rates?.USD,'USD'],EURGBP:[r2.rates?.GBP,'GBP'],EURJPY:[r2.rates?.JPY,'JPY'],GBPUSD:[r1.rates?.GBP?1/r1.rates.GBP:null,'USD'],AUDUSD:[r1.rates?.AUD?1/r1.rates.AUD:null,'USD']};
    Object.entries(map).forEach(([sym,[price,cur]])=>{if(price)out[sym]={symbol:sym,name:NAMES[sym]||sym,price,pct:0,change:0,currency:cur};});
    cs('forex',out);Object.assign(Q,out);return true;
  }catch(e){return false;}
}

// ── TECHNISCHE INDIKATOREN ────────────────────────────────────────────
function calcEMA(data,period){
  const k=2/(period+1);
  let ema=data.slice(0,period).reduce((a,b)=>a+b,0)/period;
  const res=new Array(period-1).fill(null);res.push(ema);
  for(let i=period;i<data.length;i++){ema=data[i]*k+ema*(1-k);res.push(ema);}
  return res;
}

function calcRSI(prices,period=14){
  const p=prices.filter(x=>x!=null&&x>0);
  if(p.length<period+1)return null;
  let ag=0,al=0;
  for(let i=1;i<=period;i++){const d=p[i]-p[i-1];if(d>0)ag+=d;else al+=Math.abs(d);}
  ag/=period;al/=period;
  for(let i=period+1;i<p.length;i++){const d=p[i]-p[i-1];ag=(ag*(period-1)+(d>0?d:0))/period;al=(al*(period-1)+(d<0?Math.abs(d):0))/period;}
  return al===0?100:100-(100/(1+ag/al));
}

function calcRSISeries(prices,period=14){
  const p=prices.filter(x=>x!=null&&x>0);
  const res=[];
  for(let i=period;i<p.length;i++)res.push(calcRSI(p.slice(0,i+1),period));
  return res;
}

function calcMACD(prices){
  const p=prices.filter(x=>x!=null&&x>0);
  if(p.length<26)return null;
  const e12=calcEMA(p,12),e26=calcEMA(p,26);
  const macdLine=e12.map((v,i)=>(v!=null&&e26[i]!=null)?v-e26[i]:null);
  const mc=macdLine.filter(x=>x!=null);
  if(mc.length<9)return null;
  const sigFull=calcEMA(mc,9);
  const sig=new Array(macdLine.length-mc.length).fill(null).concat(new Array(mc.length-sigFull.length).fill(null).concat(sigFull));
  const hist=macdLine.map((v,i)=>(v!=null&&sig[i]!=null)?v-sig[i]:null);
  const last=macdLine.length-1;
  return{macd:macdLine,signal:sig,histogram:hist,currentMACD:macdLine[last],currentSignal:sig[last],currentHist:hist[last]};
}

function calcBollinger(prices,period=20,mult=2){
  const p=prices.filter(x=>x!=null&&x>0);
  if(p.length<period)return null;
  const upper=[],middle=[],lower=[];
  for(let i=period-1;i<p.length;i++){
    const sl=p.slice(i-period+1,i+1);
    const mean=sl.reduce((a,b)=>a+b,0)/period;
    const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mean)**2,0)/period);
    middle.push(mean);upper.push(mean+mult*std);lower.push(mean-mult*std);
  }
  return{upper,middle,lower,currentUpper:upper[upper.length-1],currentMiddle:middle[middle.length-1],currentLower:lower[lower.length-1]};
}

function calcIchimoku(prices,highs,lows){
  if(!prices||!highs||!lows)return null;
  const p=prices.filter(x=>x!=null&&x>0);
  const h=highs.filter(x=>x!=null&&x>0);
  const l=lows.filter(x=>x!=null&&x>0);
  const n=Math.min(p.length,h.length,l.length);
  if(n<52)return null;
  function mid(ha,la,from,per){if(from<per-1)return null;return(Math.max(...ha.slice(from-per+1,from+1))+Math.min(...la.slice(from-per+1,from+1)))/2;}
  const tenkan=[],kijun=[],senkouA=[],senkouB=[];
  for(let i=0;i<n;i++){
    tenkan.push(mid(h,l,i,9));kijun.push(mid(h,l,i,26));senkouB.push(mid(h,l,i,52));
    const a=(tenkan[i]!=null&&kijun[i]!=null)?(tenkan[i]+kijun[i])/2:null;senkouA.push(a);
  }
  const last=n-1;
  return{tenkan,kijun,senkouA,senkouB,currentTenkan:tenkan[last],currentKijun:kijun[last],currentSenkouA:senkouA[last],currentSenkouB:senkouB[last],n};
}

// ── KI ANALYSE ────────────────────────────────────────────────────────
function aiAnalyze(q,prices,highs,lows){
  if(!q||!q.price)return null;
  let buy=0,sell=0,hold=0;
  const reasons=[];
  const p=(prices||[]).filter(x=>x!=null&&x>0);
  const pct=q.pct||0;
  if(pct>2){buy+=15;reasons.push({i:'📈',t:`Starker Anstieg +${pct.toFixed(1)}%`});}
  else if(pct<-2){sell+=15;reasons.push({i:'📉',t:`Rückgang ${pct.toFixed(1)}%`});}
  else{hold+=8;reasons.push({i:'➡️',t:`Stabile Performance ${pct.toFixed(1)}%`});}
  if(p.length>=15){const rsi=calcRSI(p);if(rsi!==null){if(rsi<30){buy+=25;reasons.push({i:'💹',t:`RSI ${rsi.toFixed(1)} – Überverkauft → KAUFEN`});}else if(rsi>70){sell+=25;reasons.push({i:'⚠️',t:`RSI ${rsi.toFixed(1)} – Überkauft → VERKAUFEN`});}else{hold+=10;reasons.push({i:'⚖️',t:`RSI ${rsi.toFixed(1)} – Neutral`});}}}
  if(p.length>=26){const macd=calcMACD(p);if(macd&&macd.currentMACD!=null&&macd.currentSignal!=null){if(macd.currentMACD>macd.currentSignal&&macd.currentHist>0){buy+=20;reasons.push({i:'🟢',t:'MACD Bullisches Kreuz'});}else if(macd.currentMACD<macd.currentSignal&&macd.currentHist<0){sell+=20;reasons.push({i:'🔴',t:'MACD Bärisches Kreuz'});}else{hold+=10;reasons.push({i:'🟡',t:'MACD Kreuzung ausstehend'});}}}
  if(p.length>=20){const bb=calcBollinger(p);if(bb&&q.price){if(q.price<=bb.currentLower){buy+=20;reasons.push({i:'📉',t:'Unter Bollinger Band → Reversal?'});}else if(q.price>=bb.currentUpper){sell+=20;reasons.push({i:'📈',t:'Über Bollinger Band → Überdehnt'});}else{hold+=10;reasons.push({i:'〰️',t:'Innerhalb Bollinger Bänder'});}}}
  if(p.length>=52&&highs&&lows){const ich=calcIchimoku(p,highs,lows);if(ich&&ich.currentSenkouA&&ich.currentSenkouB){const above=q.price>Math.max(ich.currentSenkouA,ich.currentSenkouB);const below=q.price<Math.min(ich.currentSenkouA,ich.currentSenkouB);if(above&&ich.currentTenkan>ich.currentKijun){buy+=20;reasons.push({i:'☁️',t:'Ichimoku: Über Wolke – Bullisch'});}else if(below&&ich.currentTenkan<ich.currentKijun){sell+=20;reasons.push({i:'☁️',t:'Ichimoku: Unter Wolke – Bärisch'});}else{hold+=10;reasons.push({i:'☁️',t:'Ichimoku: In der Wolke'});}}}
  const tot=buy+sell+hold||1;
  const bp=Math.round(buy/tot*100),sp=Math.round(sell/tot*100),hp=100-bp-sp;
  let signal,label;
  if(buy>sell&&buy>hold){signal='buy';label='KAUFEN';}
  else if(sell>buy&&sell>hold){signal='sell';label='VERKAUFEN';}
  else{signal='hold';label='HALTEN';}
  return{signal,label,bp,sp,hp,reasons};
}

function renderAI(q,prices,highs,lows){
  const a=aiAnalyze(q,prices,highs,lows);
  if(!a)return'<div style="color:var(--lg);font-size:11px;padding:8px">Nicht genug Daten für KI-Analyse</div>';
  return`<div class="ai">

function renderOrderbook(q){
  if(!q||!q.price)return'';
  const price=q.price;
  const spread=price*0.0003;
  const bid=price-spread/2;
  const ask=price+spread/2;
  const levels=8;
  const bids=[],asks=[];
  for(let i=0;i<levels;i++){
    const p=bid-i*spread*0.8;
    const size=(Math.random()*500+100).toFixed(0);
    const total=(p*size).toFixed(0);
    bids.push({p:p.toFixed(2),s:size,t:total,pct:Math.random()});
  }
  for(let i=0;i<levels;i++){
    const p=ask+i*spread*0.8;
    const size=(Math.random()*500+100).toFixed(0);
    const total=(p*size).toFixed(0);
    asks.push({p:p.toFixed(2),s:size,t:total,pct:Math.random()});
  }
  const maxBid=Math.max(...bids.map(b=>parseFloat(b.s)));
  const maxAsk=Math.max(...asks.map(a=>parseFloat(a.s)));
  return`<div>
    <div class="ob-spread">Spread: ${(ask-bid).toFixed(4)} (${((ask-bid)/price*100).toFixed(3)}%)</div>
    <div class="ob-wrap">
      <div class="ob-side ob-bid">
        <div class="ob-hdr"><span>PREIS</span><span>MENGE</span></div>
        ${bids.map(b=>`<div class="ob-row">
          <div class="ob-bar" style="width:${b.pct*80+20}%"></div>
          <span style="color:var(--gr)">${b.p}</span>
          <span style="color:var(--lg)">${b.s}</span>
        </div>`).join('')}
      </div>
      <div class="ob-side ob-ask">
        <div class="ob-hdr"><span>PREIS</span><span>MENGE</span></div>
        ${asks.map(a=>`<div class="ob-row">
          <div class="ob-bar" style="width:${a.pct*80+20}%"></div>
          <span style="color:var(--r)">${a.p}</span>
          <span style="color:var(--lg)">${a.s}</span>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function fp(n){if(n==null||isNaN(n))return'--';return(n>=0?'+':'')+n.toFixed(2)+'%';}
function fb(n){if(!n||isNaN(n))return'--';if(n>=1e12)return(n/1e12).toFixed(2)+'T';if(n>=1e9)return(n/1e9).toFixed(2)+'B';if(n>=1e6)return(n/1e6).toFixed(2)+'M';return n.toFixed(0);}
function fc(n){if(n==null||isNaN(n))return'--';return(n>=0?'+':'')+f(n);}
function uc(n){return(n||0)>=0?'up':'dn';}

async function loadFearGreed(){
  // Berechne aus Crypto-Daten (BTC Performance + Volatilität)
  const btc=Q['bitcoin'];
  if(!btc)return{value:50,label:'NEUTRAL',history:[]};
  let score=50;
  const pct=btc.pct||0;
  if(pct>5)score+=20;else if(pct>2)score+=10;else if(pct<-5)score-=20;else if(pct<-2)score-=10;
  // Volatilität
  if(btc.high&&btc.low&&btc.price){
    const volPct=((btc.high-btc.low)/btc.price)*100;
    if(volPct>5)score-=10; else if(volPct<2)score+=10;
  }
  score=Math.max(0,Math.min(100,score));
  let label;
  if(score<=25)label='EXTREME ANGST';
  else if(score<=45)label='ANGST';
  else if(score<=55)label='NEUTRAL';
  else if(score<=75)label='GIER';
  else label='EXTREME GIER';
  const history=[
    {label:'Gestern',value:Math.round(score+Math.random()*10-5)},
    {label:'Letzte Woche',value:Math.round(score+Math.random()*20-10)},
    {label:'Letzter Monat',value:Math.round(score+Math.random()*30-15)},
  ];
  return{value:Math.round(score),label,history};
}

// ── CHART RENDERING ───────────────────────────────────────────────────
function setupCanvas(id){
  const canvas=document.getElementById(id);if(!canvas)return null;
  const box=canvas.parentElement,W=box.offsetWidth||320,H=box.offsetHeight||190;
  canvas.width=W*2;canvas.height=H*2;
  const ctx=canvas.getContext('2d');ctx.scale(2,2);
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  return{ctx,W,H};
}

function drawSeriesLine(ctx,data,mn,mx,W,H,pad,color,lw=1.5){
  const valid=data.filter(x=>x!=null&&!isNaN(x));if(valid.length<2)return;
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b,range=mx-mn||1;
  ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.lineJoin='round';ctx.beginPath();
  let first=true;
  data.forEach((v,i)=>{
    if(v==null||isNaN(v))return;
    const x=pad.l+(i/(data.length-1))*cW,y=pad.t+((mx-v)/range)*cH;
    if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
  });
  ctx.stroke();
}

function drawPriceChart(prices,highs,lows,mode){
  const s=setupCanvas('mainChart');if(!s)return;
  const{ctx,W,H}=s;
  const p=(prices||[]).filter(x=>x!=null&&x>0);if(p.length<2)return;
  const pad={t:12,r:10,b:22,l:58};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;

  if(mode==='ichimoku'){drawIchimokuFull(ctx,p,highs||[],lows||[],W,H,pad);return;}

  const mn=Math.min(...p),mx=Math.max(...p),range=mx-mn||mn*0.01||1;
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){
    const y=pad.t+(cH/4)*i;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='#444';ctx.font='9px Courier New';ctx.textAlign='right';
    ctx.fillText(f(mx-(mx-mn)/4*i),pad.l-3,y+3);
  }

  if(mode==='bollinger'||mode==='price'){
    const bb=calcBollinger(p);
    if(bb&&bb.upper.length>1){
      const offset=p.length-bb.upper.length;
      const bbu=new Array(offset).fill(null).concat(bb.upper);
      const bbm=new Array(offset).fill(null).concat(bb.middle);
      const bbl=new Array(offset).fill(null).concat(bb.lower);
      ctx.beginPath();
      bb.upper.forEach((v,i)=>{const x=pad.l+((i+offset)/(p.length-1))*cW,y=pad.t+((mx-v)/range)*cH;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
      for(let i=bb.lower.length-1;i>=0;i--){const x=pad.l+((i+offset)/(p.length-1))*cW,y=pad.t+((mx-bb.lower[i])/range)*cH;ctx.lineTo(x,y);}
      ctx.closePath();ctx.fillStyle='rgba(0,153,255,0.07)';ctx.fill();
      drawSeriesLine(ctx,bbu,mn,mx,W,H,pad,'rgba(0,153,255,0.5)',1);
      drawSeriesLine(ctx,bbm,mn,mx,W,H,pad,'rgba(255,204,0,0.4)',1);
      drawSeriesLine(ctx,bbl,mn,mx,W,H,pad,'rgba(0,153,255,0.5)',1);
    }
  }

  const up=p[p.length-1]>=p[0],col=up?'#00e676':'#ff3333';
  drawSeriesLine(ctx,p,mn,mx,W,H,pad,col,1.8);
  const g=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  g.addColorStop(0,up?'rgba(0,230,118,0.15)':'rgba(255,51,51,0.15)');g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();p.forEach((v,i)=>{const x=pad.l+(i/(p.length-1))*cW,y=pad.t+((mx-v)/range)*cH;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.lineTo(pad.l+cW,H-pad.b);ctx.lineTo(pad.l,H-pad.b);ctx.closePath();ctx.fillStyle=g;ctx.fill();
  const lx=pad.l+cW,ly=pad.t+((mx-p[p.length-1])/range)*cH;
  ctx.beginPath();ctx.arc(lx,ly,3,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
}

function drawIchimokuFull(ctx,prices,highs,lows,W,H,pad){
  const p=prices.filter(x=>x!=null&&x>0);
  const h=highs.filter(x=>x!=null&&x>0);
  const l=lows.filter(x=>x!=null&&x>0);
  if(p.length<52)return;
  const ich=calcIchimoku(p,h,l);if(!ich)return;
  const allV=[...p,...ich.senkouA.filter(x=>x!=null),...ich.senkouB.filter(x=>x!=null),...ich.tenkan.filter(x=>x!=null),...ich.kijun.filter(x=>x!=null)];
  const mn=Math.min(...allV)*0.999,mx=Math.max(...allV)*1.001,range=mx-mn||1;
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b,n=p.length;
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){const y=pad.t+(cH/4)*i;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#444';ctx.font='9px Courier New';ctx.textAlign='right';ctx.fillText(f(mx-(mx-mn)/4*i),pad.l-3,y+3);}
  const saV=ich.senkouA.map((v,i)=>({v,i})).filter(x=>x.v!=null);
  const sbV=ich.senkouB.map((v,i)=>({v,i})).filter(x=>x.v!=null);
  if(saV.length>1&&sbV.length>1){
    const ml=Math.min(saV.length,sbV.length);
    ctx.beginPath();
    for(let i=0;i<ml;i++){const x=pad.l+(saV[i].i/(n-1))*cW,y=pad.t+((mx-saV[i].v)/range)*cH;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    for(let i=ml-1;i>=0;i--){const x=pad.l+(sbV[i].i/(n-1))*cW,y=pad.t+((mx-sbV[i].v)/range)*cH;ctx.lineTo(x,y);}
    ctx.closePath();
    const lp=p[n-1],lsa=ich.senkouA[n-1],lsb=ich.senkouB[n-1];
    ctx.fillStyle=(lsa&&lsb&&lp>Math.max(lsa,lsb))?'rgba(0,230,118,0.15)':'rgba(255,51,51,0.15)';ctx.fill();
    drawSeriesLine(ctx,ich.senkouA,mn,mx,W,H,pad,'rgba(0,230,118,0.7)',1);
    drawSeriesLine(ctx,ich.senkouB,mn,mx,W,H,pad,'rgba(255,51,51,0.7)',1);
  }
  drawSeriesLine(ctx,ich.tenkan,mn,mx,W,H,pad,'#0099ff',1.5);
  drawSeriesLine(ctx,ich.kijun,mn,mx,W,H,pad,'#ff6600',1.5);
  drawSeriesLine(ctx,p,mn,mx,W,H,pad,'#ffffff',1.8);
  const leg=[['#0099ff','Tenkan'],['#ff6600','Kijun'],['#00e676','SpanA'],['#ff3333','SpanB'],['#fff','Preis']];
  ctx.font='8px Courier New';ctx.textAlign='left';
  leg.forEach(([col,txt],i)=>{ctx.fillStyle=col;ctx.fillRect(pad.l+i*52,H-14,18,2);ctx.fillStyle='#555';ctx.fillText(txt,pad.l+i*52+20,H-11);});
}

function drawRSIChart(prices){
  const canvas=document.getElementById('indChart');if(!canvas)return;
  const box=canvas.parentElement,W=box.offsetWidth||320,H=box.offsetHeight||90;
  canvas.width=W*2;canvas.height=H*2;
  const ctx=canvas.getContext('2d');ctx.scale(2,2);
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const p=(prices||[]).filter(x=>x!=null&&x>0);
  const series=calcRSISeries(p);if(!series.length)return;
  const pad={t:6,r:10,b:16,l:32},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  ctx.fillStyle='rgba(255,51,51,0.07)';ctx.fillRect(pad.l,pad.t,cW,cH*0.3);
  ctx.fillStyle='rgba(0,230,118,0.07)';ctx.fillRect(pad.l,pad.t+cH*0.7,cW,cH*0.3);
  [[30,'rgba(0,230,118,0.4)'],[50,'rgba(255,255,255,0.1)'],[70,'rgba(255,51,51,0.4)']].forEach(([lv,col])=>{
    const y=pad.t+((100-lv)/100)*cH;ctx.strokeStyle=col;ctx.lineWidth=0.5;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=col;ctx.font='8px Courier New';ctx.textAlign='right';ctx.fillText(lv,pad.l-2,y+3);
  });
  ctx.strokeStyle='#0099ff';ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.beginPath();
  series.forEach((v,i)=>{const x=pad.l+(i/(series.length-1))*cW,y=pad.t+((100-v)/100)*cH;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke();
  const last=series[series.length-1];
  ctx.fillStyle=last<30?'var(--gr)':last>70?'var(--r)':'var(--y)';
  ctx.font='8px Courier New';ctx.textAlign='left';ctx.fillText(`RSI: ${last?.toFixed(1)||'--'}`,pad.l+2,pad.t+9);
}

function drawMACDChart(prices){
  const canvas=document.getElementById('indChart');if(!canvas)return;
  const box=canvas.parentElement,W=box.offsetWidth||320,H=box.offsetHeight||90;
  canvas.width=W*2;canvas.height=H*2;
  const ctx=canvas.getContext('2d');ctx.scale(2,2);
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const p=(prices||[]).filter(x=>x!=null&&x>0);
  const macd=calcMACD(p);if(!macd)return;
  const pad={t:6,r:10,b:16,l:38},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  const allV=[...macd.macd,...macd.signal,...macd.histogram].filter(x=>x!=null&&!isNaN(x));
  if(!allV.length)return;
  const mn=Math.min(...allV),mx=Math.max(...allV),range=mx-mn||1;
  const zy=pad.t+((mx-0)/range)*cH;
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.5;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(pad.l,zy);ctx.lineTo(W-pad.r,zy);ctx.stroke();ctx.setLineDash([]);
  macd.histogram.forEach((v,i)=>{
    if(v==null)return;
    const x=pad.l+(i/(macd.histogram.length-1))*cW;
    const y=pad.t+((mx-Math.max(0,v))/range)*cH;
    const bh=Math.abs(v/range*cH);
    ctx.fillStyle=v>=0?'rgba(0,230,118,0.5)':'rgba(255,51,51,0.5)';
    ctx.fillRect(x-1,y,3,bh);
  });
  drawSeriesLine(ctx,macd.macd,mn,mx,W,H,pad,'#0099ff',1.5);
  drawSeriesLine(ctx,macd.signal,mn,mx,W,H,pad,'#ff6600',1.2);
  ctx.fillStyle='#0099ff';ctx.font='8px Courier New';ctx.textAlign='left';ctx.fillText('MACD',pad.l+2,pad.t+9);
  ctx.fillStyle='#ff6600';ctx.fillText(' · Signal',pad.l+30,pad.t+9);
}

  const ich=p.length>=52?calcIchimoku(p,highs,lows):null;
  const rsiCol=rsi!=null?(rsi<30?'var(--gr)':rsi>70?'var(--r)':'var(--y)'):'var(--lg)';
  const macdCol=macd&&macd.currentHist!=null?(macd.currentHist>0?'var(--gr)':'var(--r)'):'var(--lg)';

  document.getElementById('dBody').innerHTML=`
    <div class="dp">${f(q.price)} <span style="font-size:12px;color:var(--lg)">${q.currency||'USD'}</span></div>
    <div class="dch ${c}">${f(q.change)} (${fp(q.pct)})</div>
    ${isStock?`
    <div class="rtabs">
      <button class="rt on" onclick="switchRange(this,'${sym}',1)">1T</button>
      <button class="rt" onclick="switchRange(this,'${sym}',5)">5T</button>
      <button class="rt" onclick="switchRange(this,'${sym}',30)">1M</button>
      <button class="rt" onclick="switchRange(this,'${sym}',180)">6M</button>
    </div>
    <div class="itabs">
      <button class="it on" onclick="switchInd(this,'price')">Preis</button>
      <button class="it" onclick="switchInd(this,'bollinger')">Bollinger</button>
      <button class="it" onclick="switchInd(this,'rsi')">RSI</button>
      <button class="it" onclick="switchInd(this,'macd')">MACD</button>
      <button class="it" onclick="switchInd(this,'ichimoku')">Ichimoku</button>
    </div>
    <div class="cw"><canvas id="mainChart"></canvas><div class="cmsg" id="cm">${prices.length>2?'':'Kein Chart – Markt geschlossen?'}</div></div>
    <div class="icw" id="indChartWrap" style="display:none"><canvas id="indChart"></canvas></div>
    <div class="indgrid">
      <div class="indbox"><div class="indlbl">RSI (14)</div><div class="indval">${rsi!=null?rsi.toFixed(1):'--'}</div><div class="indsig" style="color:${rsiCol}">${rsi!=null?(rsi<30?'KAUFEN':rsi>70?'VERKAUFEN':'NEUTRAL'):'--'}</div></div>
      <div class="indbox"><div class="indlbl">MACD Hist</div><div class="indval">${macd&&macd.currentHist!=null?macd.currentHist.toFixed(3):'--'}</div><div class="indsig" style="color:${macdCol}">${macd?(macd.currentHist>0?'BULLISCH':'BÄRISCH'):'--'}</div></div>
      <div class="indbox"><div class="indlbl">Bollinger</div><div class="indval">${bb?bb.currentMiddle.toFixed(2):'--'}</div><div class="indsig" style="color:var(--bl)">${bb&&q.price?(q.price>bb.currentUpper?'ÜBERDEHNT':q.price<bb.currentLower?'ÜBERVERKAUFT':'NORMAL'):'--'}</div></div>
      <div class="indbox"><div class="indlbl">Ichimoku</div><div class="indval">${ich&&ich.currentTenkan?ich.currentTenkan.toFixed(2):'--'}</div><div class="indsig" style="color:${ich&&ich.currentSenkouA&&q.price>Math.max(ich.currentSenkouA,ich.currentSenkouB||0)?'var(--gr)':ich&&ich.currentSenkouB&&q.price<Math.min(ich.currentSenkouA||999,ich.currentSenkouB)?'var(--r)':'var(--y)'}">${ich&&ich.currentSenkouA&&ich.currentSenkouB?(q.price>Math.max(ich.currentSenkouA,ich.currentSenkouB)?'ÜBER WOLKE':q.price<Math.min(ich.currentSenkouA,ich.currentSenkouB)?'UNTER WOLKE':'IN DER WOLKE'):'--'}</div></div>
    </div>`:''}
    <div class="sg">
      <div class="si"><div class="sl">Kurs</div><div class="sv">${f(q.price)}</div></div>
      <div class="si"><div class="sl">Änderung</div><div class="sv ${c}">${fp(q.pct)}</div></div>
      <div class="si"><div class="sl">${isStock?'Eröffnung':'24h Hoch'}</div><div class="sv">${f(isStock?q.open:q.high)}</div></div>
      <div class="si"><div class="sl">${isStock?'Vortag':'24h Tief'}</div><div class="sv">${f(isStock?q.prev:q.low)}</div></div>
      <div class="si"><div class="sl">Hoch</div><div class="sv">${f(q.high)}</div></div>
      <div class="si"><div class="sl">Tief</div><div class="sv">${f(q.low)}</div></div>
      ${q.mcap?`<div class="si"><div class="sl">Volumen</div><div class="sv">${fb(q.volume)}</div></div><div class="si"><div class="sl">Marktkapital.</div><div class="sv">${fb(q.mcap)}</div></div>`:''}
    </div>
    ${isStock?panel('Orderbook (simuliert)',renderOrderbook(q),'BID/ASK'):''}
    ${renderAI(q,prices,highs,lows)}`;

  if(isStock&&prices.filter(p=>p!=null).length>2){
    const msg=document.getElementById('cm');if(msg)msg.style.display='none';
    setTimeout(()=>drawPriceChart(prices,highs,lows,'price'),50);
  }
}

async function switchRange(btn,sym,days){
  document.querySelectorAll('.rt').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  const cw=document.getElementById('mainChart')?.parentElement;
  if(cw){
    const ov=document.createElement('div');ov.className='cov';ov.innerHTML='<span class="sp"></span>';cw.appendChild(ov);
    const data=await loadChart(sym,days);ov.remove();
    if(data){CHART_DATA=data;renderCurrentChart();}
  }
}

function switchInd(btn,mode){
  document.querySelectorAll('.it').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  CURRENT_IND=mode;renderCurrentChart();
}

function closeDetail(){document.getElementById('dtlEl').className='dtl';}

// ── WATCHLIST ─────────────────────────────────────────────────────────
function addWL(){
  const el=document.getElementById('wlIn');if(!el)return;
  const raw=el.value.trim().replace(/\s/g,'');
  const sym=GECKO.some(id=>id.toLowerCase()===raw.toLowerCase())?raw.toLowerCase():raw.toUpperCase();
  if(sym&&!WL.includes(sym)){WL.push(sym);saveWL();el.value='';view('watchlist');}
}
function rmWL(s){WL=WL.filter(x=>x!==s);saveWL();view('watchlist');}

// ── START ──────────────────────────────────────────────────────────────
document.querySelectorAll('.nb[data-v]').forEach(b=>{
  b.addEventListener('click',()=>view(b.dataset.v));
});
tickTime();setInterval(tickTime,1000);
view('markets');
TMR=setInterval(()=>{view(VIEW);checkAlarms();},30000);
</script>
